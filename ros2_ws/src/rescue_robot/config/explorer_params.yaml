frontier_explorer_node:
  ros__parameters:
    use_sim_time: true
    # Frame to locate the robot in for goal selection.
    #   TurtleBot3 (Gazebo Classic): base_footprint
    #   TurtleBot4 (Ignition):       turtlebot4/base_link  (override at launch)
    map_frame: map
    base_frame: base_footprint
    # A frontier cluster must have at least this many cells to be worth visiting
    # (filters out 1-2 cell noise on the explored/unknown boundary).
    min_frontier_size: 3
    # How often to (re)evaluate frontiers and pick the next goal.
    replan_period_sec: 3.0
    # Stop exploring once this fraction of the map is known. Kept just ABOVE the
    # 90 % deliverable on purpose: exploration only has to produce a CLEAN ≥90 %
    # map — the per-room camera sweep is done by the autonomous inspection phase
    # (run_demo_tb4 phase 2). Stopping early also bounds the run: pushing to 0.99
    # / "no frontiers" made v23 run 520 s, long enough for SLAM to drift, spawn
    # FAKE frontiers in the drifted area, chase them, and drift more — map ruined
    # (coverage fell to 88 %, a victim mislocalised). 0.92 stops before that.
    coverage_stop_threshold: 0.92
    # ── Frontier blacklisting ──
    # World-metre bucket size used to key blacklisted frontiers (stable as the
    # map grows). Goals within this distance count as "the same" frontier.
    blacklist_quantum_m: 0.5
    # A re-selected frontier with coverage flat for this many ticks is blacklisted
    # (catches Nav2 "success" goals that don't actually grow the map).
    stall_repeats: 3
    # Minimum coverage gain (fraction) to consider a goal as making progress.
    coverage_epsilon: 0.005
    # How many times to clear the whole blacklist (frontiers may become reachable
    # as the map grows) before declaring exploration finished.
    max_blacklist_clears: 3
    # ── Goal-selection strategy ──
    # greedy = H1 proximity (−cost) ; info_gain = H3 gain−λ·cost ; size_dist = H3.
    # The benchmark overrides this per run via the IA712_EXPLORE_STRATEGY env var.
    strategy: info_gain
    # info_gain weighting: score = gain(unknown cells in radius) − λ·cost(path).
    info_gain_lambda: 1.0
    info_gain_radius_m: 1.5
    # Skip frontiers revealing fewer than this many unknown cells (0 = off);
    # a guard against re-picking low-yield frontiers (oscillation).
    info_gain_min_gain: 0
    # After each reached goal, rotate in place to sweep the camera over the walls
    # so wall-mounted AprilTag victims are seen during normal exploration.
    spin_and_scan: true
    spin_scan_speed: 0.6       # rad/s
    spin_scan_duration: 12.0   # s → 0.6×12 = 7.2 rad > 360° : tour COMPLET pour
                               # balayer tous les murs et capter le tag quelle que
                               # soit l'orientation du robot en arrivant sur le goal.
    # Snap the chosen goal to the nearest free cell within this radius (cells)
    # before sending to Nav2 (avoids goals stuck in unknown/occupied space).
    goal_snap_radius: 8
    # Pre-check reachability with Nav2 ComputePathToPose before committing a goal;
    # unreachable frontiers are blacklisted instead of wasting a NavigateToPose.
    precheck_reachable: true
