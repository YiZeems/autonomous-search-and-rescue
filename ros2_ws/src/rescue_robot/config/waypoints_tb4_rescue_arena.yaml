# Waypoints pour rescue_arena (12x12 m, A=6) — patrouille des 4 victimes AprilTag.
# Arène : cloison y=2 (rooms nord), cloison y=-2 (rooms sud), refend vertical x=0
# avec doorways. Gravats dans chaque pièce. Les waypoints ci-dessous sont en
# ESPACE LIBRE devant chaque tag (entre les gravats et le mur porteur), JAMAIS
# sur une cloison (les anciens (0,±3.2) tombaient sur le mur x=0 -> rejet/blocage).
# Nav2 route à travers les doorways ; objectifs valides requis -> la carte doit
# couvrir les pièces : utiliser le mode hybride explore->patrouille.
#
# Tags (murs extérieurs) : victim_0 (4.6, 5.924) N, victim_2 (-4.6, 5.924) N,
#                          victim_1 (-4.6,-5.924) S, victim_3 (4.6,-5.924) S.
# Gravats : (3.6,4.2) (-3.8,4.0) (-3.6,-4.2) (3.9,-3.8) (-4.6,0).
# yaw : +1.5708 = face nord (mur nord, y>0) ; -1.5708 = face sud (mur sud, y<0).
waypoints:
  - {x:  4.6,  y:  4.6,  yaw:  1.5708}   # NE : ~1.3 m de victim_0 (5.924), face nord — DANS la portée 2 m
  - {x: -4.6,  y:  4.6,  yaw:  1.5708}   # NW : ~1.3 m de victim_2
  - {x: -4.6,  y: -4.6,  yaw: -1.5708}   # SW : ~1.3 m de victim_1
  - {x:  4.6,  y: -4.6,  yaw: -1.5708}   # SE : ~1.3 m de victim_3
# CLÉ : le tag 16 cm n'est détectable que jusqu'à ~2 m (apriltag_tags.yaml). Les
# waypoints DOIVENT être à ~1.3 m du mur, pas 2.6 m. Atteignables désormais grâce à
# SmacPlanner (A*) + goal_snap_radius + carte complète (exploration à 90 %). Le robot
# fait une pause (dwell_sec) face au mur → apriltag verrouille le tag.
